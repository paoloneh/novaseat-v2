services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — NovaSeat churn prevention database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-novaseat-db}
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novaseat}
      POSTGRES_USER: ${POSTGRES_USER:-novaseat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novaseat_secret}
    volumes:
      - ${POSTGRES_VOLUME:-pgdata}:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # pgAdmin — web UI for database management (optional, dev only)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${PGADMIN_CONTAINER_NAME:-novaseat-pgadmin}
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@novaseat.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
